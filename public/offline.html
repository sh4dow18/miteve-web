<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — Miteve</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    body {
      min-height: 100vh;
      background: #141414;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
      overflow: hidden;
      position: relative;
    }

    .bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(45, 156, 219, 0.07) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .logo {
      position: absolute;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      animation: fadeDown 0.6s ease both;
    }

    .logo img {
      height: 3rem;
      width: auto;
    }

    .content {
      position: relative;
      z-index: 1;
      max-width: 28rem;
      animation: fadeUp 0.7s ease both;
      animation-delay: 0.1s;
    }

    .icon-wrap {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 30% 30%, rgba(45, 156, 219, 0.25), rgba(45, 156, 219, 0.05));
      border: 1px solid rgba(45, 156, 219, 0.2);
      box-shadow: 0 0 40px rgba(45, 156, 219, 0.15);
    }

    .icon-wrap svg {
      width: 40px;
      height: 40px;
      color: #2d9cdb;
    }

    h1 {
      font-size: 1.875rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 0.75rem;
    }

    .divider {
      width: 3rem;
      height: 1px;
      background: #2d9cdb;
      opacity: 0.7;
      margin: 0 auto 1.25rem;
    }

    p {
      color: #a3a3a3;
      line-height: 1.625;
      max-width: 20rem;
      margin: 0 auto 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #2d9cdb 0%, #1a7ab8 100%);
      color: #fff;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      box-shadow: 0 8px 24px rgba(45, 156, 219, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px) scale(1.03);
      box-shadow: 0 12px 32px rgba(45, 156, 219, 0.45);
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2rem;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      border: 1px solid #2a2a2a;
      background: #1a1a1a;
      color: #737373;
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      animation: fadeUp 0.7s ease both;
      animation-delay: 0.2s;
    }

    .status-pill span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2d9cdb;
      animation: pulse 1.8s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="bg-glow" aria-hidden="true"></div>

  <header class="logo">
    <img src="/logo-letters.png" alt="Miteve" />
  </header>

  <main class="content">
    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="2" y1="2" x2="22" y2="22"></line>
        <path d="M8.5 16.5a7 7 0 0 1 9.9-9.9"></path>
        <path d="M12 12a9.9 9.9 0 0 1 5.6 5.6"></path>
        <path d="M5.3 18.7a15 15 0 0 1 4.7-3.1"></path>
        <path d="M2 22a20 20 0 0 1 5-3.7"></path>
        <line x1="12" y1="12" x2="12.01" y2="12"></line>
      </svg>
    </div>

    <h1>Sin conexión</h1>
    <div class="divider" aria-hidden="true"></div>
    <p>No tienes conexión a internet. Puedes seguir disfrutando del contenido que descargaste para ver offline.</p>

    <a href="/downloads" class="btn">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      Ir a Descargas offline
    </a>

    <div class="status-pill">
      <span aria-hidden="true"></span>
      Modo offline activo
    </div>
  </main>
</body>
</html>
